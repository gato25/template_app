<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// SYNCHRONOUS FETCH INTERCEPTOR FOR CAPACITOR
			(function() {
				const isNative = window.origin.startsWith('capacitor:') || (window.location.hostname === 'localhost' && !window.location.port);
				if (!isNative) return;

				const WORKER = 'https://template-app.oimod.workers.dev';
				const originalFetch = window.fetch;

				window.fetch = async function(input, init) {
					let url = '';
					if (typeof input === 'string') {
						url = input;
					} else if (input instanceof URL) {
						url = input.href;
					} else {
						url = input.url;
					}

					// Make relative URLs absolute immediately
					if (url.startsWith('/')) {
						url = window.location.origin + url;
					}

					console.log('[Global Fetch]', url);

					if (url.includes('/_app/remote/')) {
						const path = url.split('/_app/remote/')[1];
						const target = WORKER + '/proxy-remote/' + path;
						console.log('[Global Fetch] REDIRECT:', target);

						const method = init?.method || (input instanceof Request ? input.method : 'GET');
						const headers = new Headers(init?.headers || (input instanceof Request ? input.headers : {}));
						headers.delete('origin');

						let body = init?.body;
						if (!body && input instanceof Request && method !== 'GET' && method !== 'HEAD') {
							body = await input.clone().arrayBuffer();
						}

						return originalFetch(target, {
							method,
							headers,
							body,
							mode: 'cors',
							credentials: 'omit'
						}).catch(err => {
							console.error('[Global Fetch] Proxy Error:', err);
							return new Response(JSON.stringify({ type: 'error', error: { message: err.message } }), {
								status: 500,
								headers: { 'Content-Type': 'application/json' }
							});
						});
					}

					return originalFetch(url, init);
				};
				console.log('[Global Fetch] Interceptor installed in <head>');
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
